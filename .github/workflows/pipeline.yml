name: jobops-pipeline

on:
  schedule:                     # daily broad sweep + one sector per run (UTC). --sector auto maps hour->run
    - cron: "10 5 * * *"        # FULL broad market sweep (Reed/Adzuna + broad SERP + gov + LinkedIn)
    - cron: "10 7 * * *"        # Civil Services
    - cron: "10 9 * * *"        # Banking
    - cron: "10 11 * * *"       # Retail & E-Com
    - cron: "10 13 * * *"       # Product Based-Tech Companies
    - cron: "10 15 * * *"       # Insurance & Health
    - cron: "10 17 * * *"       # Energy Transport and Manufact
    - cron: "10 19 * * *"       # Service Based Tech companies
  workflow_dispatch:
    inputs:
      mode:
        description: "first (2-week backfill) or recurring (last day)"
        default: "recurring"
      sector:
        description: "sector name, 'auto' (by UTC hour), or 'full' (all sources, no focus)"
        default: "auto"
      reset:
        description: "set 'true' ONCE to wipe old Bright Data jobs and rebuild clean"
        default: "false"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55        # every-company sector runs make ~150-260 SERP calls
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          BRIGHTDATA_SERP_ZONE: ${{ secrets.BRIGHTDATA_SERP_ZONE }}
          BRIGHTDATA_LINKEDIN_DATASET: ${{ secrets.BRIGHTDATA_LINKEDIN_DATASET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >-
          python scripts/run_pipeline.py
          --mode "${{ github.event.inputs.mode || 'recurring' }}"
          --sector "${{ github.event.inputs.sector || 'auto' }}"
          ${{ github.event.inputs.reset == 'true' && '--reset-serp' || '' }}

      - name: Upload tailored CVs + digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobops-output
          path: output/
          retention-days: 14
          if-no-files-found: ignore
