name: jobops-pipeline

on:
  schedule:
    - cron: "0 */6 * * *"      # every 6 hours (UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: "first (2-week backfill) or recurring (last day)"
        default: "recurring"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          APIFY_TOKEN_1: ${{ secrets.APIFY_TOKEN_1 }}
          APIFY_TOKEN_2: ${{ secrets.APIFY_TOKEN_2 }}
          APIFY_TOKEN_3: ${{ secrets.APIFY_TOKEN_3 }}
          APIFY_TOKEN_4: ${{ secrets.APIFY_TOKEN_4 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/run_pipeline.py --mode "${{ github.event.inputs.mode || 'recurring' }}"

      - name: Upload tailored CVs + digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobops-output
          path: output/
          retention-days: 14
          if-no-files-found: ignore
