name: jobops-pipeline

on:
  schedule:
    # ONE daily run at 03:00 UTC = 4 AM UK (BST). Covers EVERY company + broad market in a single
    # steady pass (GitHub cron is UTC and can't auto-adjust for DST; in winter this is 3 AM GMT).
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "first (2-week backfill) or recurring (last day)"
        default: "recurring"
      sector:
        description: "'all' (every company, default daily run), a sector name, 'auto', or 'full'"
        default: "all"
      reset:
        description: "set 'true' ONCE to wipe old Bright Data jobs and rebuild clean"
        default: "false"
      wipe:
        description: "set 'true' ONCE to DELETE ALL jobs + run history (full reset), then rebuild"
        default: "false"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120       # the single daily all-company run is a long, steady pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          BRIGHTDATA_SERP_ZONE: ${{ secrets.BRIGHTDATA_SERP_ZONE }}
          BRIGHTDATA_LINKEDIN_DATASET: ${{ secrets.BRIGHTDATA_LINKEDIN_DATASET }}
          APIFY_TOKEN_1: ${{ secrets.APIFY_TOKEN_1 }}
          APIFY_TOKEN_2: ${{ secrets.APIFY_TOKEN_2 }}
          APIFY_TOKEN_3: ${{ secrets.APIFY_TOKEN_3 }}
          APIFY_TOKEN_4: ${{ secrets.APIFY_TOKEN_4 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >-
          python scripts/run_pipeline.py
          --mode "${{ github.event.inputs.mode || 'recurring' }}"
          --sector "${{ github.event.inputs.sector || 'all' }}"
          ${{ github.event.inputs.wipe == 'true' && '--wipe-all' || '' }}
          ${{ github.event.inputs.reset == 'true' && '--reset-serp' || '' }}

      - name: Upload tailored CVs + digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobops-output
          path: output/
          retention-days: 14
          if-no-files-found: ignore
