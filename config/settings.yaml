scoring:
  tailor_threshold: 70           # only tailor a CV when fit score >= this (saves tokens)
  shortlist_threshold: 60
  max_score_per_run: 150         # DeepSeek (paid credits) is cheap + batched, so score a big backlog each run
  score_batch_size: 8            # jobs scored per LLM call (fewer calls + tokens; clears backlog faster)
  max_tailor_per_run: 8          # Gemini via Google AI Pro has expanded limits, so tailor a few more per run

notify:
  min_fit: 75                    # only send a Telegram alert for jobs at/above this fit
  max_per_run: 10                # cap Telegram messages per run (avoid spam)
  heartbeat: true                # send a short 'run complete' message each run (set false once confirmed working)

sources:
  reed: { enabled: true }
  adzuna: { enabled: true, country: "gb" }
  ats: { enabled: true }         # Greenhouse/Lever/Ashby/SmartRecruiters/Workday/Workable/Recruitee/Eightfold
  brightdata:                    # Google job search via Bright Data SERP API (main engine)
    enabled: true
    country: "gb"
    pages: 1                     # SERP pages per query (each page = 1 billed request; keep low for credits)
    search_domains:              # broad queries scoped to TRUSTED UK boards only (aggregators dropped)
      - "uk.linkedin.com/jobs"
      - "www.reed.co.uk/jobs"
    top_companies_per_run: 5     # rotating per-company sample for the active sector (DS + DA each)
    max_queries: 22              # broad + gov/site + per-company, capped for credit control
    gov_queries: ["data analyst", "data scientist", "data engineer"]
    civil_service_sectors: ["Civil Services"]   # add civilservicejobs site: queries on this sector's run
    nhs_sectors: ["Insurance & Health"]         # add jobs.nhs.uk site: queries on this sector's run
    linkedin_site: false         # set true to add site:uk.linkedin.com/jobs queries on the broad run
    extra_queries:               # broad market queries (both categories) - run on the daily full/broad run
      - "data scientist United Kingdom"
      - "machine learning engineer United Kingdom"
      - "data analyst United Kingdom"
      - "data analytics United Kingdom"
      - "business intelligence analyst United Kingdom"
      - "analytics engineer United Kingdom"
      - "AI engineer United Kingdom"
      - "graduate data scientist United Kingdom"

cleanup:                         # one-time / ongoing housekeeping, runs every pass (idempotent)
  purge_sources: ["Apify"]       # delete rows from retired sources (old 'Google (Apify)' rows)

bucket_list:
  path: "data/companies_master.csv"       # 1165 target companies across 7 sectors (Master List)

rotation:                        # one sector per scheduled run; all 7 covered once/day with time gaps
  enabled: true
  sectors:                       # order maps to schedule_hours_utc below (index 0 also does the broad sweep)
    - "Civil Services"
    - "Banking"
    - "Retail & E-Com"
    - "Product Based-Tech Companies"
    - "Insurance & Health"
    - "Energy Transport and Manufact"
    - "Service Based Tech companies"
  schedule_hours_utc: [7, 9, 11, 13, 15, 17, 19]   # `--sector auto` maps the current UTC hour -> sector
  broad_hour_utc: 5              # a dedicated daily FULL/broad run (all sources, no sector focus) at this hour
  broad_on_index: -1             # -1 = no sector run does the broad sweep (only the dedicated full run does)

llm:
  # Tier reality: DeepSeek = paid credits (cheap, bulk scoring); Gemini = Google AI Pro
  # plan (expanded AI Studio API limits, quality tailoring); Groq = free fallback.
  primary: "gemini"              # general fallback provider
  critic: ""                     # "" = off (saves ~half the calls)
  # Per-task routing (parallel model usage). Each task falls back through the
  # others if its provider has no key or errors.
  score_provider: "deepseek"     # high-volume fit-scoring: cheap paid credits, strong, high limits
  score_model: "deepseek-chat"
  tailor_provider: "gemini"      # quality CV tailoring: best instruction-following (AI Pro expanded limits)
  tailor_model: "gemini-2.5-pro"
  gemini_model: "gemini-2.0-flash"   # default/fallback Gemini model (higher limits)
  groq_model: "llama-3.3-70b-versatile"
  deepseek_model: "deepseek-chat"
  request_delay_seconds: 2.5     # scoring runs on DeepSeek; Gemini recommendations have AI Pro expanded limits
