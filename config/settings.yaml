# uk-jobops configuration. Edit freely; secrets live in .env / GitHub Secrets.

candidate:
  name: "Manoj Ram Mopati"
  base_cv: "src/uk_jobops/cv/base_cv.json"   # your real experience (single source of truth)
  right_to_work: "UK Graduate visa (eligible to work in the UK without sponsorship)"
  locations_base: "Birmingham, UK"
  open_to_relocation: true

search:
  queries:
    - "data scientist"
    - "machine learning engineer"
    - "marketing data scientist"
    - "associate data scientist"
    - "junior data scientist"
    - "graduate data scientist"
    - "data science analyst"
    - "applied scientist"
    - "AI engineer"
  locations: ["United Kingdom", "London", "Birmingham", "Manchester", "Edinburgh",
              "Glasgow", "Leeds", "Bristol", "Remote UK"]
  recency_days_recurring: 7      # rolling week window so nothing recent is missed between runs
  recency_days_first: 21         # first run backfills 3 weeks
  max_per_source: 200            # pull deeper from each free API (Reed/Adzuna)
  require_bucket: false           # strict: keep ONLY jobs from your 750 target companies (max focus)

seniority:
  include:                       # role must match one of these (on the TITLE)
    - "data scientist"
    - "machine learning engineer"
    - "associate data scientist"
    - "junior data scientist"
    - "graduate data scientist"
    - "data science analyst"
    - "applied scientist"
    - "ai engineer"
  exclude_title:                 # drop these (whole-word, IC-level only)
    - "senior"
    - "sr"
    - "lead"
    - "principal"
    - "staff"
    - "head of"
    - "director"
    - "vp"
    - "vice president"
    - "chief"
    - "manager"
    - "trainee"                   # training-course adverts, not real hiring
  exclude_recruiters: true       # drop recruitment agencies (names matching recruit/staffing/rpo/etc.)
  exclude_company:               # course advertisers + named agencies the keyword filter misses
    - "IT Career Switch"
    - "Career Switch"
    - "Nuyew"
    - "KnowledgeHut"
    - "Lorien"
    - "Robert Half"
    - "Morgan McKinley"
    - "Searchability"
    - "Salt Search"
    - "Mercor"
    - "VIA MATCH"
    - "167 Solutions"
    - "Gleeson"
    - "Huxley"
    - "Sanderson"
    - "Boston Hale"
    - "Oscar Associates"
    - "Oscar Technology"
    - "Digital Waffle"
    - "Advanced Resource Managers"
    - "MicroTECH Global"
    - "True North Group"
    - "Pioneering People"
    - "JobHeron"
    - "Aperia"
    - "INTEC SELECT"
    - "Hays"
    - "Michael Page"
    - "Adecco"
    - "Randstad"
    - "SThree"
    - "Nigel Frank"
    - "Twenty AI"

scoring:
  tailor_threshold: 70           # only tailor a CV when fit score >= this (saves tokens)
  shortlist_threshold: 60
  max_score_per_run: 120         # DeepSeek is cheap + batched, so score a big backlog each run
  score_batch_size: 8            # jobs scored per LLM call (fewer calls + tokens; clears backlog faster)
  max_tailor_per_run: 6          # cap CV tailoring per run; the backlog clears over runs

notify:
  min_fit: 75                    # only send a Telegram alert for jobs at/above this fit
  max_per_run: 10                # cap Telegram messages per run (avoid spam)
  heartbeat: true                # send a short 'run complete' message each run (set false once confirmed working)

sources:
  reed: { enabled: true }
  adzuna: { enabled: true, country: "gb" }
  ats: { enabled: true }         # Greenhouse / Lever / Ashby for bucket-list companies
  careers_playwright: { enabled: false }
  apify:                         # Google Jobs via Apify (LinkedIn/Indeed/Glassdoor/Totaljobs/CV-Library/NHS/gov)
    enabled: true
    actor: "johnvc~google-jobs-scraper"
    top_companies_per_run: 8     # rotating sample of top-100 target companies searched each run
    num_results: 120             # deep pagination so more of the market is captured
    max_queries: 16              # extra + generic + company queries, capped for cost/time
    extra_queries:               # always-run broad + government searches Reed/Adzuna miss
      - "data scientist United Kingdom"
      - "machine learning engineer United Kingdom"
      - "data scientist NHS"
      - "data scientist civil service"
      - "data scientist UK government"
      - "data analyst civil service"
      - "AI engineer United Kingdom"
  serpapi: { enabled: false }    # paid

bucket_list:
  path: "data/companies_bucketlist.csv"   # company_name, careers_url (replace with yours)

llm:
  primary: "gemini"              # general fallback provider
  critic: ""                     # "" = off (saves ~half the calls)
  # Per-task routing (parallel model usage). Each task falls back through the
  # others if its provider has no key or errors.
  score_provider: "deepseek"     # high-volume fit-scoring: cheap, strong, high limits
  score_model: "deepseek-chat"
  tailor_provider: "gemini"      # quality CV tailoring: best instruction-following
  tailor_model: "gemini-2.5-pro"
  gemini_model: "gemini-2.0-flash"   # default/fallback Gemini model (higher free limits)
  groq_model: "llama-3.3-70b-versatile"
  deepseek_model: "deepseek-chat"
  max_repair_loops: 1
  request_delay_seconds: 4.0     # ~15 requests/min - respects Gemini Flash free-tier RPM
  rulebook: "config/rulebook.md"
