# uk-jobops configuration. Edit freely; secrets live in .env / GitHub Secrets.

candidate:
  name: "Manoj Ram Mopati"
  base_cv: "src/uk_jobops/cv/base_cv.json"   # your real experience (single source of truth)
  profile: "data/profile.json"               # your preferences + scoring rubric (edit the FILL fields)
  right_to_work: "UK Graduate visa (eligible to work in the UK without sponsorship)"
  locations_base: "Birmingham, UK"
  open_to_relocation: true

search:
  queries:
    # --- category 1: DATA SCIENCE ---
    - "data scientist"
    - "machine learning engineer"
    - "marketing data scientist"
    - "associate data scientist"
    - "junior data scientist"
    - "graduate data scientist"
    - "applied scientist"
    - "AI engineer"
    # --- category 2: DATA ANALYSIS ---
    - "data analyst"
    - "data analytics"
    - "analytics engineer"
    - "business intelligence analyst"
    - "insight analyst"
    - "data science analyst"
  locations: ["United Kingdom", "London", "Birmingham", "Manchester", "Edinburgh",
              "Glasgow", "Leeds", "Bristol", "Remote UK"]
  recency_days_recurring: 7      # rolling week window so nothing recent is missed between runs
  recency_days_first: 21         # first run backfills 3 weeks
  max_per_source: 200            # pull deeper from each free API (Reed/Adzuna)
  require_bucket: false           # strict: keep ONLY jobs from your 750 target companies (max focus)

seniority:
  include:                       # role must match one of these (on the TITLE); covers BOTH categories
    # data science
    - "data scientist"
    - "machine learning engineer"
    - "ml engineer"
    - "associate data scientist"
    - "junior data scientist"
    - "graduate data scientist"
    - "applied scientist"
    - "ai engineer"
    - "decision scientist"
    # data analysis
    - "data analyst"
    - "data analytics"
    - "analytics engineer"
    - "business intelligence analyst"
    - "bi analyst"
    - "insight analyst"
    - "insights analyst"
    - "reporting analyst"
    - "mi analyst"
    - "data science analyst"
  exclude_title:                 # drop these (whole-word, IC-level only)
    - "senior"
    - "sr"
    - "lead"
    - "principal"
    - "staff"
    - "head of"
    - "director"
    - "vp"
    - "vice president"
    - "chief"
    - "manager"
    - "trainee"                   # training-course adverts, not real hiring
  exclude_recruiters: true       # drop recruitment agencies (names matching recruit/staffing/rpo/etc.)
  exclude_company:               # course advertisers + named agencies the keyword filter misses
    - "IT Career Switch"
    - "Career Switch"
    - "Nuyew"
    - "KnowledgeHut"
    - "Lorien"
    - "Robert Half"
    - "Morgan McKinley"
